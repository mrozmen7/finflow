version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: finflow-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: finflow
      POSTGRES_USER: finflow
      POSTGRES_PASSWORD: finflow
    volumes:
      - finflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U finflow']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: finflow-redis
    ports:
      - '6379:6379'
    volumes:
      - finflow-redis-data:/var/lib/redis/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  finflow-postgres-data:
  finflow-redis-data:
