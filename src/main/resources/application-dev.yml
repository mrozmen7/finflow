spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/finflow
    username: finflow
    password: finflow
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    com.finflow: DEBUG
    org.springframework.web: DEBUG
