spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/finflow
    username: finflow
    password: finflow
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: finflow-fraud-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

jwt:
  secret: ZmluZmxvdy1kZXYtand0LXNlY3JldC1rZXktMjU2LWJpdC1kZXYtb25seS1ub3QtZm9yLXByb2Q=
  expiration: 86400000

resilience4j:
  retry:
    instances:
      transferRetry:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - org.springframework.orm.ObjectOptimisticLockingFailureException
        ignore-exceptions:
          - com.finflow.shared.exception.ResourceNotFoundException
          - java.lang.IllegalArgumentException
          - java.lang.IllegalStateException
  circuit-breaker:
    instances:
      getAccountCB:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3

logging:
  level:
    com.finflow: DEBUG
    org.springframework.web: DEBUG
